{% load static %}

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <title>{% block titulo %}UniSena{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <style>
      body {
        background: linear-gradient(135deg, #125f58, #d8f5d0);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Segoe UI;
      }

      .card-auth {
        width: 450px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        animation: fade 0.8s;
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
        }
      }

      .logo-sena {
        width: 120px;
        display: block;
        margin: auto;
        margin-bottom: 10px;
        transition: 0.3s;
      }

      .logo-sena:hover {
        transform: scale(1.05);
      }
      .logo-sena {
        animation: flotar 2s infinite ease-in-out;
      }

      @keyframes flotar {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
        100% {
          transform: translateY(0);
        }
      }

      .brand {
        text-align: center;
        font-weight: 700;
        color: #125f58;
        margin-bottom: 15px;
        letter-spacing: 2px;
      }

      .form-control:focus {
        border-color: #125f58;
        box-shadow: 0 0 5px rgba(57, 169, 0, 0.4);
      }

      .btn-main {
        background: #125f58;
        border: none;
        font-weight: 600;
        transition: 0.3s;
      }

      .btn-main:hover {
        background: #125f58;
        transform: scale(1.03);
      }

      .alert-custom {
        background: #e9f9e4;
        color: #125f58;
        border-left: 5px solid #125f58;
      }
      .alert {
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      input,
      select {
        transition: 0.3s;
      }

      input:hover,
      select:hover {
        transform: scale(1.02);
      }
    </style>
  </head>

  <body>
    <div id="particles-js"></div>
    <div class="card card-auth p-4">
      <a href="{% url 'landing' %}">
        <img src="{% static 'img/logo.jpeg' %}" class="logo-sena" />
      </a>

      <div class="brand">UNISENA</div>

      {% block contenido %} {% endblock %}
    </div>
  </body>
  <script>
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
      history.go(1);
    };
  </script>
</html>
